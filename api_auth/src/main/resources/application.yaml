spring:
  application:
    name: api_auth

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:auth_user}
    password: ${SPRING_DATASOURCE_PASSWORD:auth_pass}

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

server:
  port: 8082

# Configuración JWT
jwt:
  secret: ${JWT_SECRET:miSecretoSuperSeguroParaJWT2024DebeSerMuyLargoPorSeguridad}
  expiration: 3600000  # 1 hora en milisegundos (3600000 ms = 1h)
