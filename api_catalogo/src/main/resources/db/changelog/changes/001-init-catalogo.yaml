databaseChangeLog:
  
  # 1. Crear tabla Categorias (sin dependencias)
  - changeSet:
      id: 001-create-categorias
      author: api_catalogo
      changes:
        - createTable:
            tableName: categorias
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: TEXT

  # 2. Crear tabla products (depende de categorias)
  - changeSet:
      id: 002-create-products
      author: api_catalogo
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: descripcion
                  type: TEXT
              - column:
                  name: precio
                  type: NUMERIC(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: categoria_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: creado_en
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: categoria_id
            referencedTableName: categorias
            referencedColumnNames: id
            constraintName: fk_products_categorias

  # 3. Crear tabla inventario (1 a 1 con products)
  - changeSet:
      id: 003-create-inventario
      author: api_catalogo
      changes:
        - createTable:
            tableName: inventario
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: stock_disponible
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: actualizado_en
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: inventario
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_inventario_products

  # 4. Crear tabla movimientos (muchos a 1 con products)
  - changeSet:
      id: 004-create-movimientos
      author: api_catalogo
      changes:
        - createTable:
            tableName: movimientos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: id_producto
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: cantidad
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: creado_en
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: movimientos
            baseColumnNames: id_producto
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_movimientos_products